name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck packages/shared
        run: npx tsc --noEmit -p packages/shared

      - name: Typecheck apps/mobile
        run: npx tsc --noEmit -p apps/mobile

      - name: Typecheck apps/web
        run: npx tsc --noEmit -p apps/web

      # Static export for Cloudflare Pages; no env vars needed — endpoints.ts
      # falls back gracefully when NEXT_PUBLIC_SUPABASE_FUNCTIONS_URL is unset.
      - name: Build apps/web
        run: npm run build --workspace web

  # [Opus 4.8] Deno unit tests for the Edge Functions' pure logic
  # (notification prefs + RevenueCat product decoding). Fast + deterministic.
  edge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Test Edge Function logic
        run: deno test supabase/functions/_shared/

  # pgTAP suite against the real schema: RLS isolation, deck ranking, and the
  # security-hardening regressions (column grants + integrity triggers). The
  # GitHub runner has Docker, so `supabase db start` spins up local Postgres,
  # applies every migration, and `supabase test db` runs each *.test.sql in a
  # rolled-back transaction. These protect the guarantees that break silently.
  db-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Postgres + apply migrations
        run: supabase db start
      - name: Run pgTAP tests
        run: supabase test db
